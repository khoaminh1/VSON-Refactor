<!--
  PageHeader — interior page header (navy band below sticky nav).
  Props (from content/pages/[page].json → page_header):
    title    {string}
    subtitle {string}
-->
<header class="page-header">
  <div class="container">
    <h1>{{page_header.title}}</h1>
    <p>{{page_header.subtitle}}</p>
  </div>
</header>
