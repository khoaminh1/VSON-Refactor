<!--
  Home page (index.html) — pure assembly shell.
  All partials inherit the root context (site, nav, footer, page, and the
  page's own top-level keys spread in by build.js: meta, hero, value_chain, etc.)
  So hash-param passing is not needed — partials reach for their slice directly.
-->
<!DOCTYPE html>
<html lang="{{site.lang}}">
<head>
  {{> layout/base-head}}
</head>
<body>

  <a href="#main-content" class="sr-only">Skip to main content</a>

  {{> layout/nav}}

  <main id="main-content">
    {{> sections/Hero}}
    {{> sections/ValueChain}}
    {{> sections/AudienceCards}}
    {{> sections/WhyChecklist}}
    {{> sections/CapabilityGrid}}
    {{> sections/LeadershipCards}}
    {{> sections/VaultPreview}}
    {{> sections/CtaBand}}
  </main>

  {{> layout/footer}}

  <script src="/components/js/shared.js" defer></script>
</body>
</html>
